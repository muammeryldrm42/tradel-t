[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npm run build -w packages/common",
  "npm run build -w packages/strategy",
  "npm run build -w packages/risk",
  "npm run build -w packages/execution",
  "npm run build -w packages/backtest",
  "npm run db:generate -w apps/api",
  "npm run build -w apps/api"
]

[start]
cmd = "npm run db:push -w apps/api && node apps/api/dist/server.js"
